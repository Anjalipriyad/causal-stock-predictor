# =============================================================================
# causal-stock-predictor — master config
# All hardcoded values across the entire project live here.
# Every module reads from this file. Nothing is hardcoded elsewhere.
# =============================================================================

project:
  name: causal-stock-predictor
  version: 0.1.0
  random_seed: 42                         # used in train/test splits + model init

# -----------------------------------------------------------------------------
# Data — directories + tickers + date ranges
# -----------------------------------------------------------------------------
data:
  start_date: "2010-01-01"               # historical pull start (US stocks)
  end_date:   "2025-12-31"               # historical pull end   (US stocks)

  # Relative to project root
  raw_dir:       "ml/data/raw"           # written once during training
  live_dir:      "ml/data/live"          # overwritten at every inference call
  processed_dir: "ml/data/processed"     # feature matrices + regime labels

  tickers:
    target:                              # US stocks we predict
      - AAPL
      - MSFT
      - GOOGL

    # ── Nifty 50 targets (use with --market india) ─────────────────────────
    target_india:
      - RELIANCE.NS
      - TCS.NS
      - INFY.NS
      - HDFCBANK.NS
      - ICICIBANK.NS
      - HINDUNILVR.NS
      - ITC.NS
      - SBIN.NS
      - BAJFINANCE.NS
      - WIPRO.NS

    macro:                               # US macro signals (default)
      - "^VIX"
      - "^TNX"
      - "^IRX"
      - "DX-Y.NYB"
      - "GC=F"
      - "CL=F"
      - "^GSPC"

    macro_india:                         # India macro signals (use with --market india)
      - "^INDIAVIX"
      - "GC=F"
      - "CL=F"
      - "USDINR=X"
      - "^NSEI"
      - "^NSEBANK"

    sector_etfs:                         # US sector ETFs (default)
      - XLK
      - XLF
      - XLE
      - XLV
      - XLI

    sector_india:                        # NSE sector indices (use with --market india)
      - "^CNXIT"
      - "^NSEBANK"
      - "^CNXAUTO"
      - "^CNXPHARMA"
      - "^CNXFMCG"

  price_columns: ["open", "high", "low", "close", "volume"]
  live_lookback_days: 90

# -----------------------------------------------------------------------------
# Finnhub API
# -----------------------------------------------------------------------------
finnhub:
  api_key:  ${FINNHUB_API_KEY}
  base_url: "https://finnhub.io/api/v1"
  sentiment_window_days: 30
  request_delay_seconds: 0.5
  max_retries: 3
  timeout_seconds: 10

# -----------------------------------------------------------------------------
# Feature engineering
# -----------------------------------------------------------------------------
features:

  technical:
    rsi_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    bollinger_window: 20
    bollinger_std: 2
    momentum_windows: [5, 10, 20]
    volatility_windows: [10, 20, 30]
    atr_period: 14

  macro:
    vix_change_windows: [1, 5]
    yield_spread: true
    cross_asset_returns: true
    macro_rolling_windows: [5, 10]

  sentiment:
    rolling_windows: [3, 5, 10]
    buzz_windows: [3, 5]

  min_rows_after_engineering: 200

  earnings:
    enabled: true
    decay_days: 30
    surprise_threshold: 0.05

  options:
    enabled: true
    expiry_windows: [30, 60]
    iv_rv_windows: [20, 30]

  finbert:
    enabled: false
    model: "ProsusAI/finbert"
    batch_size: 32
    max_length: 512
    fallback_to_keyword: true

  use_optuna: false
  optuna_trials: 100

# -----------------------------------------------------------------------------
# Causal discovery
# -----------------------------------------------------------------------------
causal:

  granger:
    max_lag: 5
    significance: 0.05
    test: "ssr_chi2test"

  pcmci:
    tau_min: 1
    tau_max: 3
    pc_alpha: 0.10
    cond_ind_test: "ParCorr"
    alpha_level: 0.01

  selector:
    strategy: "intersection"
    min_causal_features: 3
    max_causal_features: 15

# -----------------------------------------------------------------------------
# Model training
# -----------------------------------------------------------------------------
model:

  target: "excess_return_5d"
  horizon_days: 5

  # Chronological split ratios (train/val/test)
  train_ratio: 0.70
  val_ratio:   0.15
  test_ratio:  0.15

  scaler: "StandardScaler"

  # Small-regime fallback and crash routing
  simple_min_samples: 100         # when to use SimpleDirectionModel fallback
  vix_crash_level: 30             # india_vix threshold to define crash dataset

  # Sample weighting configuration (used to upweight crash / high-VIX rows)
  sample_weighting:
    enabled: true
    method: "vix"
    base_weight: 1.0
    moderate_vix_threshold: 35
    moderate_vix_weight: 3.0
    extreme_vix_threshold: 50
    extreme_vix_weight: 5.0

  # Meta-classifier and threshold tuning
  use_meta_classifier: true
  classifier_return_scale: 0.02   # scale factor to map probability->pseudo-return
  threshold_tuning:
    regressor_grid_min: -0.05
    regressor_grid_max: 0.05
    regressor_grid_steps: 101
    classifier_grid_min: 0.30
    classifier_grid_max: 0.70
    classifier_grid_steps: 41

  lgbm:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    num_leaves: 31
    min_child_samples: 20
    subsample: 0.8
    subsample_freq: 1
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    early_stopping_rounds: 50
    verbose: -1

  xgb:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    early_stopping_rounds: 50
    verbosity: 0

  arima:
    max_p: 5
    max_q: 5
    max_d: 2
    seasonal: false
    information_criterion: "aic"

  ensemble:
    weights:
      lgbm:  0.50
      xgb:   0.35
      arima: 0.15
    weights_with_tft:
      lgbm:  0.35
      xgb:   0.25
      arima: 0.10
      tft:   0.30
    confidence_z: 1.645

# -----------------------------------------------------------------------------
# Evaluation + backtesting
# -----------------------------------------------------------------------------
evaluation:

  # ── US market regimes (default, used when --market us) ───────────────────
  regimes:
    bull:        ["2010-01-01", "2019-12-31"]
    covid_crash: ["2020-01-01", "2020-06-30"]
    recovery:    ["2020-07-01", "2021-12-31"]
    rate_hike:   ["2022-01-01", "2022-12-31"]
    ai_bull:     ["2023-01-01", "2025-12-31"]

  # Active market switch — change to "india" when running Nifty
  active_market: "us"

  # ── India market regimes (used when --market india) ───────────────────────
  #
  # IMPORTANT NOTES ON REGIME DESIGN:
  #
  # 1. gfc_crash (2008-2009) is intentionally EXCLUDED from backtesting regimes.
  #    It only has 266 rows and Option B gives 0 training rows before it starts.
  #    It exists implicitly as the "seed" training period for gfc_recovery.
  #    Document this in the paper as a data availability limitation.
  #
  # 2. demonetisation (Nov 2016-Feb 2017) has ZERO rows in both the price data
  #    AND the headlines file. This is a source data collection gap, not a
  #    loader bug. The RegimeSplitter will find 0 rows and skip it gracefully
  #    (min_test_samples = 60 enforced in backtester). The regime is kept in
  #    the config so it appears in regime_stats() and can be documented in
  #    the paper as a known gap.
  #
  # 3. pre_demonetisation ends on 2016-10-28 (last available price row before
  #    the gap) rather than 2016-10-31 (calendar month end). Using 2016-10-31
  #    is also fine — the splitter uses loc[start:end] which is date-inclusive.
  #
  # 4. Option B train sizes verified:
  #    gfc_crash:          0 rows  (excluded from backtesting)
  #    gfc_recovery:       266 rows (below 500 minimum — model unreliable, document in paper)
  #    pre_demonetisation: 1407 rows (reliable)
  #    demonetisation:     1778 rows (0 test rows — skipped automatically)
  #    recovery_india:     1779 rows (reliable)
  #    covid_crash:        2456 rows (reliable)
  #    recovery_covid:     2584 rows (reliable)
  #    rate_hike_rbi:      2818 rows (reliable)
  #    current_bull:       3206 rows (reliable)
  #
  regimes_india:
    # GFC recovery: Nifty 3060→6364 (+106%) on global QE + FII inflows
    # DA will be ~0.46 — only 266 training rows precede this regime.
    # LightGBM needs minimum ~500 rows to be reliable.
    # This is a DATA AVAILABILITY LIMITATION, not a model problem.
    # Document explicitly in the paper.
    gfc_recovery:       ["2009-04-01", "2013-12-31"]

    # Pre-demonetisation bull: Modi election rally, Nifty +39%, VIX avg 15.5
    # Data gaps in 2014-2015 mean only 371 rows are available IN this regime,
    # but the 1407 training rows before it are reliable.
    pre_demonetisation: ["2014-01-01", "2016-10-31"]

    # Demonetisation shock: Modi banned ₹500/₹1000 notes on 8 Nov 2016
    # ZERO ROWS in both price data and headlines — source collection gap.
    # RegimeSplitter returns empty DataFrame; backtester skips automatically.
    # Kept in config for paper documentation purposes only.
    demonetisation:     ["2016-11-01", "2017-02-28"]

    # Post-demonetisation recovery: market absorbed the shock, GST rollout
    # Data resumes from 2017-03-01 after the collection gap.
    # 1779 training rows before this regime — reliable.
    recovery_india:     ["2017-03-01", "2019-12-31"]

    # COVID crash: Nifty -38% in 6 weeks, India VIX peaked at 79.3
    # Hardest regime to predict. DA ~0.50 is the honest answer.
    # Any model claiming >0.60 here is likely leaking close price levels.
    covid_crash:        ["2020-01-01", "2020-06-30"]

    # Stimulus-driven melt-up: Nifty +64%, P/E peaked at 42
    # Hard because the market kept rising against fundamental signals.
    recovery_covid:     ["2020-07-01", "2021-12-31"]

    # RBI rate hike cycle: 250bps to fight inflation, VIX elevated at 23.4
    # Model performs well here — rate hike regimes have clear causal structure.
    # (VIX up → market down, yield signals matter)
    rate_hike_rbi:      ["2022-01-01", "2023-06-30"]

    # Current India bull run: growth story, low VIX 15.4, moderate P/E 22.6
    # Model's best regime — most similar to training data distribution.
    current_bull:       ["2023-07-01", "2024-11-01"]

  # Walk-forward backtest settings
  backtest:
    initial_train_years: 3
    step_size_months: 3
    # Set to 60 — this is the gate that silently drops the demonetisation
    # regime (0 rows) and the gfc_crash "regime" (excluded from config).
    # gfc_recovery (1142 rows) passes this gate but the 266 training rows
    # limitation should be noted separately in the paper.
    min_test_samples: 60

  # Trading simulation
  trading:
    initial_capital: 100000
    transaction_cost_bps: 10
    risk_free_rate_annual: 0.04
    trading_days_per_year: 252

  # Metrics to compute and report
  metrics:
    - directional_accuracy
    - sharpe_ratio
    - rmse
    - mape
    - max_drawdown
    - calmar_ratio

# -----------------------------------------------------------------------------
# Saved model artefacts
# -----------------------------------------------------------------------------
saved_models:
  dir: "ml/saved_models"
  lgbm_filename:            "lgbm_{ticker}.pkl"
  xgb_filename:             "xgb_{ticker}.pkl"
  arima_filename:           "arima_{ticker}.pkl"
  scaler_filename:          "scaler_{ticker}.pkl"
  causal_features_filename: "causal_features_{ticker}.json"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s — %(message)s"
  log_dir: "ml/logs"